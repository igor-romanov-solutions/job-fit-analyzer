# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "develop", "main" ]
  pull_request:
    branches: [ "develop", "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      #actions/checkout@v6.0.2
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

    - name: Set up JDK 21
      #actions/setup-java@v5.2.0
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: ./mvnw -B package --file pom.xml

    - name: SonarCloud analysis
      # SonarCloud free plan allows pull requests and only one default branch ('develop' in our case)
      if: github.ref == 'refs/heads/develop'
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        ./mvnw -B verify sonar:sonar \
            -Dsonar.projectKey=igor-romanov-solutions_job-fit-analyzer \
            -Dsonar.organization=igor-romanov-solutions \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.qualitygate.wait=true \
            -Dsonar.token=$SONAR_TOKEN

    - name: Upload JAR artifact
      #actions/upload-artifact@v7.0.1
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: job-fit-analyzer-jar-${{ github.sha }}
        path: target/*.jar
        retention-days: 7
