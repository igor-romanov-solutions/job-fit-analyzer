services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: jobfit
      POSTGRES_USER: jobfit
      POSTGRES_PASSWORD: jobfit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobfit -d jobfit"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: igorromanovsolutions/job-fit-analyzer:test
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/jobfit
      SPRING_DATASOURCE_USERNAME: jobfit
      SPRING_DATASOURCE_PASSWORD: jobfit
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "8080:8080"

volumes:
  postgres_data:
