<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Analysis History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="bg-light">

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container py-4">

    <div class="mb-3">
        <div class="text-uppercase small fw-semibold mb-2" style="color: #0972D3; letter-spacing: 0.08em;">
            Analysis history
        </div>
        <h1 class="display-6 fw-bold mb-2 app-title">
            Saved analyses
        </h1>
        <p class="text-secondary mb-0 app-subtitle">
            Browse previously generated results.
        </p>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-4">

            <div th:if="${#lists.isEmpty(analyses)}" class="text-secondary">
                No analyses yet.
            </div>

            <div th:if="${not #lists.isEmpty(analyses)}" class="table-responsive">
                <table class="table align-middle">
                    <thead>
                    <tr>
                        <th>Date</th>
                        <th>Role</th>
                        <th>Seniority</th>
                        <th>Domain</th>
                        <th>Language</th>
                        <th>Java</th>
                        <th>Job preview</th>
                        <th></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item : ${analyses}">
                        <td th:text="${#temporals.format(item.createdAt, 'yyyy-MM-dd HH:mm')}">2026-04-06 20:00</td>
                        <td th:text="${item.roleType}">Backend</td>
                        <td th:text="${item.seniorityLevel}">Senior</td>
                        <td th:text="${item.domain}">Banking</td>
                        <td th:text="${item.vacancyLanguage}">English</td>
                        <td th:text="${item.javaRelevance}">High</td>
                        <td class="text-secondary" th:text="${item.jobDescriptionPreview}">Preview text...</td>
                        <td>
                            <a th:href="@{/analyses/{id}(id=${item.id})}" class="btn btn-sm btn-outline-primary">
                                View
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</div>

</body>
</html>
