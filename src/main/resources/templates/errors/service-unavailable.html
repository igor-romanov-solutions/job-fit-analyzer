<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Service Unavailable</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-xl-7">
            <div class="card shadow-sm border-0">
                <div class="card-body p-5 text-center">
                    <div class="text-uppercase small fw-semibold mb-2"
                         style="color: #0972D3; letter-spacing: 0.08em;">
                        Error 503
                    </div>

                    <h1 class="display-6 fw-bold mb-3 app-title">Service temporarily unavailable</h1>

                    <p class="text-secondary mb-4 app-subtitle">
                        The external service is not responding right now. Please try again in a moment.
                    </p>

                    <div class="alert alert-warning border-0 text-start mb-4">
                        <strong th:text="${errorCode}">EXTERNAL_SERVICE_ERROR</strong>
                        <span class="d-block mt-1" th:text="${message}">External service is temporarily unavailable.</span>
                    </div>

                    <div class="d-flex flex-wrap justify-content-center gap-2">
                        <button class="btn btn-primary" type="button" onclick="location.reload()">Retry</button>
                        <a class="btn btn-outline-secondary" th:href="@{/jobs}">Back to jobs</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
