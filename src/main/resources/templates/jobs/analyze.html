<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Analyze Job</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <div class="mb-3">
        <div class="text-uppercase small fw-semibold mb-2" style="color: #0972D3; letter-spacing: 0.08em;">
            Job postings
        </div>
        <h1 class="display-6 fw-bold mb-2 app-title">
            Analyze job match
        </h1>
        <p class="text-secondary mb-0 app-subtitle">
            Paste your CV and analyze this vacancy.
        </p>
    </div>

    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body p-4">
            <div class="row g-4">
                <div class="col-md-6">
                    <div class="text-uppercase text-secondary small fw-semibold mb-1">Status</div>
                    <span class="badge text-bg-secondary" th:text="${job.status}">NEW</span>
                </div>

                <div class="col-md-6">
                    <div class="text-uppercase text-secondary small fw-semibold mb-1">Source URL</div>
                    <a th:if="${job.sourceUrl != null and !#strings.isEmpty(job.sourceUrl)}"
                       th:href="${job.sourceUrl}"
                       target="_blank"
                       rel="noopener noreferrer"
                       th:text="${job.sourceUrl}">
                    </a>
                    <div th:unless="${job.sourceUrl != null and !#strings.isEmpty(job.sourceUrl)}"
                         class="text-secondary">
                        (not set)
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="text-uppercase text-secondary small fw-semibold mb-1">Company</div>
                    <div th:text="${job.companyName != null ? job.companyName : '(not set)'}">Company</div>
                </div>

                <div class="col-md-6">
                    <div class="text-uppercase text-secondary small fw-semibold mb-1">Job title</div>
                    <div th:text="${job.jobTitle != null ? job.jobTitle : '(not set)'}">Senior Java Developer</div>
                </div>

                <div class="col-md-6">
                    <div class="text-uppercase text-secondary small fw-semibold mb-1">Location</div>
                    <div th:text="${job.location != null ? job.location : '(not set)'}">Zurich</div>
                </div>

                <div class="col-md-6 d-flex justify-content-md-end align-items-md-end">
                    <button type="submit"
                            form="jobAnalysisForm"
                            class="btn btn-sm btn-outline-success">
                        Analyze
                    </button>
                </div>

                <div class="col-12">
                    <div class="text-uppercase text-secondary small fw-semibold mb-2">Description</div>
                    <div class="bg-light border rounded-3 p-3" style="white-space: pre-wrap;"
                         th:text="${job.description}">
                        Job description text...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body p-4">
            <form th:action="@{/jobs/{id}/analyze(id=${job.id})}"
                  th:object="${jobAnalysisForm}"
                  method="post"
                  id="jobAnalysisForm">
                <input type="hidden" name="returnTo" th:value="${returnTo}">
                <div class="mb-3">
                    <label for="cvText" class="form-label small fw-semibold text-uppercase text-secondary mb-2">
                        CV
                    </label>
                    <textarea id="cvText"
                              class="form-control"
                              th:field="*{cvText}"
                              rows="10"
                              placeholder="Paste your CV here..."></textarea>
                    <div class="text-danger small mt-2"
                         th:if="${#fields.hasErrors('cvText')}"
                         th:errors="*{cvText}"></div>
                </div>

                <div class="d-flex flex-wrap gap-2">
                    <button type="submit" class="btn btn-primary">
                        Analyze
                    </button>
                    <a class="btn btn-outline-secondary" th:href="@{/jobs/{id}(id=${job.id})}">
                        Back to Job
                    </a>
                </div>
            </form>
        </div>
    </div>

    <div th:if="${error != null}" class="alert alert-danger" th:text="${error}"></div>
</div>

<script>
    const STORAGE_KEY = 'jobfitanalyzer.cvText';

    document.addEventListener('DOMContentLoaded', () => {
        const cvTextArea = document.getElementById('cvText');
        if (!cvTextArea) {
            return;
        }

        const savedCv = sessionStorage.getItem(STORAGE_KEY);
        if (savedCv && !cvTextArea.value) {
            cvTextArea.value = savedCv;
        }

        cvTextArea.addEventListener('input', () => {
            sessionStorage.setItem(STORAGE_KEY, cvTextArea.value);
        });

        const form = document.getElementById('jobAnalysisForm');
        if (form) {
            form.addEventListener('submit', () => {
                sessionStorage.setItem(STORAGE_KEY, cvTextArea.value);
            });
        }
    });
</script>

</body>
</html>
