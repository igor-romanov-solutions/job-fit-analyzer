<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Jobs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <div class="mb-3 d-flex flex-wrap justify-content-between align-items-start gap-3">
        <div>
            <div class="text-uppercase small fw-semibold mb-2" style="color: #0972D3; letter-spacing: 0.08em;">
                Job postings
            </div>
            <h1 class="display-6 fw-bold mb-2 app-title">
                Saved jobs
            </h1>
            <p class="text-secondary mb-0 app-subtitle">
                Browse, filter, and open stored job postings.
            </p>
        </div>

        <div>
            <a class="btn btn-primary" th:href="@{/jobs/new}">
                + Add Job
            </a>
        </div>
    </div>

    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body p-4">
            <form method="get" th:action="@{/jobs}" class="row g-3 align-items-end">
                <div class="col-12 col-md-6 col-lg-4">
                    <label for="status" class="form-label small fw-semibold text-uppercase text-secondary mb-2">
                        Filter by status
                    </label>
                    <select id="status" name="status" class="form-select">
                        <option value="" th:selected="${selectedStatus == null}">All</option>
                        <option th:each="status : ${allStatuses}"
                                th:value="${status}"
                                th:text="${status}"
                                th:selected="${selectedStatus == status}">
                        </option>
                    </select>
                </div>

                <div class="col-12 col-md-auto">
                    <button type="submit" class="btn btn-outline-primary">
                        Apply
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <div th:if="${#lists.isEmpty(jobs)}" class="text-secondary">
                No jobs yet.
            </div>

            <div th:if="${not #lists.isEmpty(jobs)}" class="table-responsive">
                <table class="table align-middle">
                    <thead>
                    <tr>
                        <th>Title</th>
                        <th>Company</th>
                        <th>Location</th>
                        <th>Status</th>
                        <th>Updated</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="job : ${jobs}">
                        <td th:text="${job.jobTitle != null ? job.jobTitle : '(no title)'}">Job title</td>
                        <td th:text="${job.companyName != null ? job.companyName : '(no company)'}">Company</td>
                        <td th:text="${job.location != null ? job.location : '(not set)'}">Zurich</td>
                        <td>
                            <span class="badge text-bg-secondary" th:text="${job.status}">NEW</span>
                        </td>
                        <td th:text="${job.updatedAt != null ? #temporals.format(job.updatedAt, 'yyyy-MM-dd HH:mm') : '-'}">
                            2026-04-06 20:00
                        </td>
                        <td>
                            <a th:href="@{/jobs/{id}(id=${job.id})}" class="btn btn-sm btn-outline-primary">
                                View
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

</body>
</html>
