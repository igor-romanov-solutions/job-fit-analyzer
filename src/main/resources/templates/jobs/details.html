<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Job Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="bg-light">

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container py-4">
    <div class="mb-3">
        <div class="text-uppercase small fw-semibold mb-2" style="color: #0972D3; letter-spacing: 0.08em;">
            Job postings
        </div>
        <h1 class="display-6 fw-bold mb-2 app-title">
            Job details
        </h1>
        <p class="text-secondary mb-0 app-subtitle">
            Review the saved vacancy and its current analysis summary.
        </p>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <div class="row g-4">
                <div class="col-md-6">
                    <div class="text-uppercase text-secondary small fw-semibold mb-1">Status</div>
                    <div>
                        <span class="badge text-bg-secondary" th:text="${job.status}">DRAFT</span>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="text-uppercase text-secondary small fw-semibold mb-1">Source URL</div>
                    <a th:if="${job.sourceUrl != null}"
                       th:href="${job.sourceUrl}"
                       target="_blank"
                       rel="noopener noreferrer"
                       th:text="${job.sourceUrl}">
                    </a>
                    <div th:unless="${job.sourceUrl != null}">(not set)</div>
                </div>

                <div class="col-md-6">
                    <div class="text-uppercase text-secondary small fw-semibold mb-1">Company</div>
                    <div th:text="${job.companyName != null ? job.companyName : '(not set)'}">Company</div>
                </div>

                <div class="col-md-6">
                    <div class="text-uppercase text-secondary small fw-semibold mb-1">Job title</div>
                    <div th:text="${job.jobTitle != null ? job.jobTitle : '(not set)'}">Senior Java Developer</div>
                </div>

                <div class="col-md-6">
                    <div class="text-uppercase text-secondary small fw-semibold mb-1">Location</div>
                    <div th:text="${job.location != null ? job.location : '(not set)'}">Zurich, Switzerland</div>
                </div>

                <div class="col-12">
                    <div class="text-uppercase text-secondary small fw-semibold mb-2">Description</div>

                    <button id="descriptionToggle"
                            class="btn btn-link p-0 text-decoration-none d-inline-flex align-items-center gap-2"
                            type="button"
                            data-bs-toggle="collapse"
                            data-bs-target="#jobDescriptionCollapse"
                            aria-expanded="false"
                            aria-controls="jobDescriptionCollapse">
                        <span class="text-secondary">▸</span>
                        <span>Show description</span>
                    </button>

                    <div class="collapse mt-2" id="jobDescriptionCollapse">
                        <div class="bg-light border rounded-3 p-3" style="white-space: pre-wrap;"
                             th:text="${job.description}">
                            Job description text...
                        </div>
                    </div>
                </div>

                <div class="col-12">
                    <div class="text-uppercase text-secondary small fw-semibold mb-2">Analysis</div>
                    <div class="bg-light border rounded-3 p-3" style="white-space: pre-wrap;"
                         th:text="${job.analysisSummary != null ? job.analysisSummary : 'No analysis yet.'}">
                        No analysis yet.
                    </div>
                </div>

                <div class="col-12">
                    <div class="d-flex flex-wrap gap-2 pt-2">
                        <a class="btn btn-primary" th:href="@{/jobs/{id}/edit(id=${job.id})}">
                            Edit
                        </a>
                        <a class="btn btn-outline-secondary" th:href="@{/jobs}">
                            Back to Jobs
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const collapseElement = document.getElementById('jobDescriptionCollapse');
    const toggleButton = document.getElementById('descriptionToggle');

    if (collapseElement && toggleButton) {
        collapseElement.addEventListener('show.bs.collapse', function () {
            toggleButton.querySelector('span:last-child').textContent = 'Hide description';
            toggleButton.querySelector('span:first-child').textContent = '▾';
        });

        collapseElement.addEventListener('hide.bs.collapse', function () {
            toggleButton.querySelector('span:last-child').textContent = 'Show description';
            toggleButton.querySelector('span:first-child').textContent = '▸';
        });
    }
</script>
</body>
</html>
