<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Analysis Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="bg-light">

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container py-4">

    <div class="mb-3">
        <div class="text-uppercase small fw-semibold mb-2" style="color: #0972D3; letter-spacing: 0.08em;">
            Analysis history
        </div>
        <h1 class="display-6 fw-bold mb-2 app-title">
            Saved analyses
        </h1>
        <p class="text-secondary mb-0 app-subtitle">
            Browse previously generated results.
        </p>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-4">

            <div class="row g-4">

                <div class="col-md-6">
                    <div class="text-uppercase text-secondary small fw-semibold mb-1">Date</div>
                    <div th:text="${#temporals.format(analysis.createdAt, 'yyyy-MM-dd HH:mm')}"></div>
                </div>

                <div class="col-md-6">
                    <div class="text-uppercase text-secondary small fw-semibold mb-1">Role focus</div>
                    <div th:text="${analysis.roleType}"></div>
                </div>

                <div class="col-md-6">
                    <div class="text-uppercase text-secondary small fw-semibold mb-1">Java relevance</div>
                    <div th:text="${analysis.javaRelevance}"></div>
                </div>

                <div class="col-md-6">
                    <div class="text-uppercase text-secondary small fw-semibold mb-1">Seniority</div>
                    <div th:text="${analysis.seniorityLevel}"></div>
                </div>

                <div class="col-md-6">
                    <div class="text-uppercase text-secondary small fw-semibold mb-1">Domain</div>
                    <div th:text="${analysis.domain}"></div>
                </div>

                <div class="col-md-6">
                    <div class="text-uppercase text-secondary small fw-semibold mb-1">Vacancy language</div>
                    <div th:text="${analysis.vacancyLanguage}"></div>
                </div>

                <div class="col-md-6">
                    <div class="text-uppercase text-secondary small fw-semibold mb-1">German required</div>
                    <span class="badge text-bg-info" th:text="${analysis.requiredGermanLevel}"></span>
                </div>

                <div class="col-12">
                    <div class="text-uppercase text-secondary small fw-semibold mb-2">Primary stack</div>
                    <div class="d-flex flex-wrap gap-2">
                        <span th:each="tech : ${analysis.primaryStack}"
                              class="badge rounded-pill text-bg-primary"
                              th:text="${tech}"></span>
                    </div>
                </div>

                <div class="col-12">
                    <div class="text-uppercase text-secondary small fw-semibold mb-2">Secondary stack</div>
                    <div class="d-flex flex-wrap gap-2">
                        <span th:each="tech : ${analysis.secondaryStack}"
                              class="badge rounded-pill text-bg-secondary"
                              th:text="${tech}"></span>
                    </div>
                </div>

                <div class="col-12">
                    <div class="text-uppercase text-secondary small fw-semibold mb-2">Nice to have</div>
                    <div class="d-flex flex-wrap gap-2">
                        <span th:each="tech : ${analysis.niceToHaveStack}"
                              class="badge rounded-pill text-bg-light border text-dark"
                              th:text="${tech}"></span>
                    </div>
                </div>

                <div class="col-12">
                    <hr class="my-3">
                    <div class="text-uppercase text-secondary small fw-semibold mb-2">
                        Potential concerns
                    </div>
                    <div class="bg-light border rounded-3 p-3">
                        <ul class="mb-0 ps-3">
                            <li th:each="gap : ${analysis.gaps}" th:text="${gap}"></li>
                        </ul>
                    </div>
                </div>

            </div>

        </div>
    </div>

</div>

</body>
</html>
