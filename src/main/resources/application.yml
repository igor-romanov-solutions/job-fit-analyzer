spring:
  application:
    name: JobFitAnalyzer

  thymeleaf:
    cache: false

openai:
  api-key: ${OPENAI_API_KEY:}

server:
  servlet:
    session:
      tracking-modes: cookie
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
