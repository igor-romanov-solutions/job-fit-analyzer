spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/jobfit
    username: ${DB_USERNAME:jobfit}
    password: ${DB_PASSWORD:jobfit}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    org.flywaydb: DEBUG
    org.springframework.boot.autoconfigure.flyway: DEBUG